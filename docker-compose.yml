services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: studyzone_db
    ports:
      - "5432:5432"
    restart: unless-stopped

  app:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/studyzone_db
    ports:
      - "8000:8000"
    restart: unless-stopped